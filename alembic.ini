# Alembic config. The DB URL is resolved at runtime in migrations/env.py from
# HexGraph config (HEXGRAPH_DB_PATH / ~/.hexgraph/hexgraph.db), so it is left
# blank here. Programmatic use (db/migrate.py) builds an equivalent Config.
[alembic]
script_location = migrations
prepend_sys_path = src

[loggers]
keys = root,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
