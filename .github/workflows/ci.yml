name: CI

# The merge gate. Two kinds of lane:
#   * `tests` / `frontend` / `audit` run on every push and PR — fast, no Docker.
#   * `docker` builds the sandbox image and runs `just test-ci`, which FAILS FAST
#     unless Docker + the image are present, so the security-critical egress / exec /
#     rehost / remote paths actually execute. A green offline run proves NONE of those
#     (they silently skip), which is exactly why this lane exists.
#
# Not covered here: the rehost / KVM / privileged-FirmAE lanes need /dev/kvm or a
# privileged container, which GitHub-hosted runners don't provide. Those stay local
# (or move to a self-hosted runner) and are documented as such.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch/PR cancels the older in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: tests (offline, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          # No requirements.txt in this repo — hash pyproject.toml so the cache
          # key resolves instead of erroring on the default **/requirements.txt glob.
          cache-dependency-path: pyproject.toml
      - name: Install (server + dev extras)
        run: python -m pip install -e ".[server,dev]"
      - name: Run the offline suite
        # Docker-gated tests auto-skip here; -rs surfaces the skip reasons so a
        # reviewer can see exactly which live paths went unexercised on this lane.
        run: python -m pytest -q -rs

  frontend:
    name: frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Type-check + build the SPA
        # `tsc -b && vite build` — catches TypeScript regressions and a broken bundle.
        working-directory: frontend
        run: npm run build

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    # Advisory, not a gate: a fresh upstream advisory shouldn't block an unrelated PR.
    # Findings show up in the step log; promote to a hard gate once the baseline is clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit
          python -m pip install -e ".[server,dev,byok,mcp]"
          pip-audit --desc --skip-editable

  docker:
    name: live tests (sandbox image + just test-ci)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: extractions/setup-just@v2
      - uses: docker/setup-buildx-action@v3
      - name: Build the sandbox image (layer-cached)
        # Build with buildx + the GitHub Actions cache and `load` it as the tag
        # `just test-ci` looks for, so the heavy toolchain layers (sasquatch, qemu-user,
        # sleuthkit, …) are reused across runs instead of rebuilt every time.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/sandbox.Dockerfile
          tags: hexgraph-sandbox:latest
          load: true
          build-args: WITH_GHIDRA=0
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Assert the binutils quick-facts tools are present in the image
        # The binutils_probe (Phase 5A) shells out to nm/objdump/readelf/strings — these
        # ship transitively via the `binutils` apt package already in sandbox.Dockerfile.
        # Fail the build loudly if an image change ever drops them, so the probe can't
        # silently regress to an empty result (design §2.7).
        run: |
          docker run --rm hexgraph-sandbox:latest sh -c '
            set -e
            for t in nm objdump readelf strings; do
              command -v "$t" >/dev/null || { echo "MISSING binutils tool: $t"; exit 1; }
            done
            echo "binutils quick-facts tools present: nm objdump readelf strings"'
      - name: Assert FLOSS is present in the image
        # The floss_probe (Phase 5A PR 5A-2) shells out to the FLARE `floss` CLI, added as
        # the flare-floss pip dependency in sandbox.Dockerfile. Fail the build loudly if an
        # image change ever drops it, so the opt-in features.floss path can't silently break
        # (design §2.7) — this is the image-building job that exercises the new dependency.
        run: |
          docker run --rm hexgraph-sandbox:latest sh -c '
            set -e
            command -v floss >/dev/null || { echo "MISSING tool: floss"; exit 1; }
            python3 -c "import floss.main" || { echo "floss not importable"; exit 1; }
            echo "FLOSS present: $(floss --version 2>&1 | head -1)"'
      - name: Assert YARA is present in the image
        # The yara_probe (Phase 5B) imports `yara` (yara-python, added in sandbox.Dockerfile).
        # Fail the build loudly if an image change ever drops it, so the opt-in features.yara
        # pattern sweep can't silently break (design §2.7) — this image-building job exercises
        # the new dependency.
        run: |
          docker run --rm hexgraph-sandbox:latest sh -c '
            set -e
            python3 -c "import yara; print(\"yara-python\", yara.__version__)" \
              || { echo "yara-python not importable"; exit 1; }
            echo "YARA present"'
      - name: Install into .venv
        # `just test-ci` / `just demo` run `.venv/bin/python` (the justfile's `py` var),
        # so install into a venv the way `just install` does — not the system interpreter.
        run: just install
      - name: Run the CI gate (fails fast if the image is missing)
        run: just test-ci
      - name: Smoke-test the full offline loop
        run: just demo

  ghidra:
    name: ghidra decompile gate (WITH_GHIDRA=1)
    runs-on: ubuntu-latest
    # Separate lane so the heavy Ghidra build (JDK 21 + ~400 MB Ghidra) doesn't block
    # the offline matrix. This is the durable fix for the bug that shipped TWICE: nothing
    # exercised a WITH_GHIDRA build end to end, so a JDK/version mismatch went unnoticed.
    # The build itself asserts JDK ↔ Ghidra alignment; this job then decompiles a fixture
    # and asserts the output is real C, so Ghidra cannot regress to broken silently.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: docker/setup-buildx-action@v3
      - name: Build the sandbox image WITH_GHIDRA=1 (layer-cached)
        # A failed build-time JDK assertion fails this step outright. Cache is keyed
        # separately from the WITH_GHIDRA=0 docker lane (different build-args).
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/sandbox.Dockerfile
          tags: hexgraph-sandbox:ci-ghidra
          load: true
          build-args: WITH_GHIDRA=1
          cache-from: type=gha,scope=ghidra
          cache-to: type=gha,mode=max,scope=ghidra
      - name: Install hexgraph
        # The gate now drives the REAL production path (SandboxRunner.run_probe) so it can
        # never diverge from production hardening; that needs the package importable.
        run: python -m pip install -e .
      - name: Decompile a fixture and assert real C (under production hardening)
        # Fails the job if Ghidra returns an error, pseudo-asm, or nothing. Runs the probe
        # through SandboxRunner.run_probe — the exact call GhidraDecompiler makes.
        run: python3 scripts/ci_ghidra_decompile_check.py hexgraph-sandbox:ci-ghidra

  angr:
    name: angr solver gate (dedicated angr image + licensegate solve)
    runs-on: ubuntu-latest
    # Separate lane so the heavy angr pip stack (angr + z3 + the claripy/pyvex/cle chain) doesn't
    # block the offline matrix. angr ships in its OWN optional image (docker/angr.Dockerfile, D10),
    # NOT the base sandbox, so this is the ONLY lane that exercises the get_solver() → angr probe
    # path end to end. The build is large (~several minutes / hundreds of MB of wheels) but the
    # GHA layer cache keeps the angr pip layer warm across runs.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: docker/setup-buildx-action@v3
      - name: Build the dedicated angr image (layer-cached)
        # Cache is keyed separately from the sandbox lanes (a different Dockerfile). Loaded as the
        # tag the test gate (`_angr_ready` / `angr_image()`) looks for so the e2e actually RUNS.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/angr.Dockerfile
          tags: hexgraph-angr:latest
          load: true
          cache-from: type=gha,scope=angr
          cache-to: type=gha,mode=max,scope=angr
      - name: Assert the angr stack is present in the image
        # The angr_probe imports angr/claripy/z3. Fail the build loudly if a version bump or image
        # change ever drops them, so the opt-in features.angr solver path can't silently break
        # (design §2.7) — this image-building job is what exercises the heavy new dependency.
        run: |
          docker run --rm --entrypoint python3 hexgraph-angr:latest -c '
          import angr, claripy, z3
          print("angr", angr.__version__, "| z3", z3.get_version_string())'
      - name: Install hexgraph (+ dev for pytest)
        run: python -m pip install -e ".[dev]"
      - name: Solve the licensegate fixture end to end (real angr, in the image)
        # The proof: angr recovers a constraint-satisfying serial reaching system("/bin/grant_admin")
        # and the vulnerability finding carries it. Runs the probe through the production
        # get_solver() → AngrSolver → SandboxRunner.run_probe path. -rs surfaces a skip so a
        # mis-tagged image can't make this lane silently pass without solving.
        run: python -m pytest tests/test_solver_e2e.py -q -rs
