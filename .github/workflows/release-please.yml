name: release-please

# Conventional-Commits-driven releases. On every push to main, release-please keeps a
# standing "release PR" that rolls up the pending version bump + CHANGELOG. Merging that PR
# writes the new version into pyproject.toml, tags it, and cuts the GitHub release.
# Config lives in release-please-config.json; the current version in
# .release-please-manifest.json.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
